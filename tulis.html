<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aksara – Tulis Cerita</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--navy:#0c1f5e;--blue:#1a56db;--pale:#bfdbfe;--bg:#f8f9fc;--text:#1e3a5f;--muted:#7a93b8;--border:#e8edf5;--white:#ffffff;}
    #page-guard{position:fixed;inset:0;z-index:9999;background:#f8f9fc;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
    #page-guard .g-logo{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#0c1f5e,#1a56db);display:flex;align-items:center;justify-content:center;}
    #page-guard .g-ring{width:36px;height:36px;border-radius:50%;border:3px solid #e8edf5;border-top-color:#1a56db;animation:spin .7s linear infinite;}
    #page-guard p{font-family:'DM Sans',sans-serif;color:#7a93b8;font-size:13.5px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:14px;}
    .nav-back{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;border:1.5px solid var(--border);padding:7px 13px;border-radius:10px;transition:all .2s;}
    .nav-back:hover{color:var(--navy);border-color:var(--pale);background:#f0f7ff;}
    .nav-title-area{flex:1;min-width:0;}
    .nav-story-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .nav-story-sub{font-size:11px;color:var(--muted);}
    .nav-acts{display:flex;gap:8px;flex-shrink:0;}
    .btn-save{padding:9px 20px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 14px rgba(26,86,219,.25);transition:all .2s;display:flex;align-items:center;gap:6px;}
    .btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,86,219,.35);}
    .btn-out{padding:9px 16px;border-radius:11px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
    .btn-out:hover{border-color:var(--pale);background:#f0f7ff;color:var(--blue);}
    .layout{display:flex;padding-top:64px;min-height:100vh;}
    .sidebar{width:270px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);position:fixed;top:64px;left:0;bottom:0;display:flex;flex-direction:column;}
    .sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
    .sb-heading{font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
    .count-badge{font-size:11px;font-weight:600;background:#eff6ff;color:var(--blue);padding:2px 8px;border-radius:99px;}
    .btn-add{display:flex;align-items:center;gap:6px;width:100%;padding:10px 12px;border-radius:10px;border:1.5px dashed var(--pale);background:#f0f7ff;color:var(--blue);font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
    .btn-add:hover{background:#dbeafe;border-color:var(--blue);}
    .ch-list{flex:1;overflow-y:auto;padding:10px;}
    .ch-item{padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:3px;border:1.5px solid transparent;}
    .ch-item:hover{background:var(--bg);}
    .ch-item.active{background:#eff6ff;border-color:var(--pale);}
    .ch-num{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
    .ch-ttl{font-size:13px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ch-acts{display:flex;gap:4px;margin-top:6px;}
    .ch-del{padding:3px 8px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;background:#fff1f2;color:#dc2626;}
    .ch-del:hover{background:#fee2e2;}
    .editor{margin-left:270px;padding:32px 40px;max-width:900px;}
    .card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:26px 30px;margin-bottom:22px;box-shadow:0 1px 6px rgba(12,31,94,.04);}
    .card-title{font-family:'Poppins',sans-serif;font-size:14.5px;font-weight:700;color:var(--navy);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .fg{display:flex;flex-direction:column;margin-bottom:14px;}
    .lbl{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;}
    .inp,.sel,.ta{width:100%;border-radius:11px;border:1.5px solid var(--border);padding:11px 14px;background:var(--bg);font-size:13.5px;color:var(--text);outline:none;transition:all .2s;font-family:'DM Sans',sans-serif;}
    .inp:focus,.sel:focus,.ta:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,86,219,.08);}
    .ta{resize:vertical;line-height:1.65;}
    .ta-lg{min-height:300px;font-size:14.5px;line-height:1.85;}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .full{grid-column:1/-1;}
    .cover-row{display:flex;gap:16px;align-items:flex-start;}
    .cover-box{width:90px;height:135px;border-radius:10px;border:1.5px solid var(--border);overflow:hidden;background:linear-gradient(135deg,#e8edf5,#bfdbfe);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;}
    .cover-box img{width:100%;height:100%;object-fit:cover;}
    .cover-hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.5;}
    .illus-img{width:100%;max-height:200px;object-fit:cover;border-radius:10px;border:1px solid var(--border);display:none;margin-bottom:10px;}
    .illus-img.show{display:block;}
    .pub-row{display:flex;align-items:center;justify-content:space-between;border-radius:14px;padding:15px 18px;margin-bottom:22px;}
    .pub-row.pub{background:#f0fdf4;border:1.5px solid #bbf7d0;}
    .pub-row.draft{background:#fefce8;border:1.5px solid #fde68a;}
    .pub-title{font-weight:700;font-size:13.5px;color:var(--navy);}
    .pub-sub{font-size:12px;color:var(--muted);margin-top:2px;}
    .tgl{padding:9px 20px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
    .tgl.pub{background:#16a34a;color:#fff;} .tgl.pub:hover{background:#15803d;}
    .tgl.draft{background:#f59e0b;color:#fff;} .tgl.draft:hover{background:#d97706;}
    .ch-panel{display:none;} .ch-panel.on{display:block;}
    .wc-row{display:flex;justify-content:space-between;margin-top:5px;}
    .wc{font-size:11.5px;color:var(--muted);}
    .status-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--border);border-radius:12px;padding:9px 18px;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);font-weight:500;box-shadow:0 4px 20px rgba(12,31,94,.08);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s;}
    .status-bar.on{opacity:1;}
    .s-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;}
    .s-dot.saving{background:#f59e0b;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .msg{border-radius:11px;padding:10px 13px;font-size:12.5px;font-weight:500;margin-bottom:14px;display:none;line-height:1.5;}
    .msg.err{background:#fee2e2;color:#dc2626;display:block;border:1px solid #fecaca;}
    .msg.ok{background:#eff6ff;color:#1d4ed8;display:block;border:1px solid #bfdbfe;}
    #toast{position:fixed;bottom:24px;right:24px;z-index:9999;border-radius:13px;padding:10px 20px;font-size:13.5px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.12);opacity:0;transform:translateY(16px);transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
    #toast.on{opacity:1;transform:translateY(0);}
    #toast.green{background:linear-gradient(135deg,#059669,#16a34a);color:#fff;}
    #toast.red{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;}
    #toast.blue{background:linear-gradient(135deg,#1a56db,#2563eb);color:#fff;}
    @media(max-width:768px){.sidebar{display:none;}.editor{margin-left:0;padding:20px 16px;}.g2{grid-template-columns:1fr;}.navbar{padding:0 14px;}}
  </style>
</head>
<body>
<div id="page-guard">
  <div class="g-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
  <div class="g-ring"></div>
  <p>Aksara</p>
</div>

<div class="navbar">
  <a class="nav-back" href="dashboard.html">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Dashboard
  </a>
  <div class="nav-title-area">
    <div class="nav-story-title" id="nav-ttl">Cerita Baru</div>
    <div class="nav-story-sub" id="nav-sub">Draft · belum diterbitkan</div>
  </div>
  <div class="nav-acts">
    <button class="btn-out" onclick="saveDraft()">💾 Simpan</button>
    <button class="btn-save" onclick="togglePublish()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
      <span id="pub-btn-txt">Terbitkan</span>
    </button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-heading">Daftar Bab <span class="count-badge" id="ch-badge">0 bab</span></div>
      <button class="btn-add" onclick="newChapter()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah Bab Baru
      </button>
    </div>
    <div class="ch-list" id="ch-list"><div style="padding:18px;text-align:center;font-size:12.5px;color:var(--muted);">Belum ada bab.</div></div>
  </aside>

  <div class="editor">
    <div class="msg" id="msg"></div>

    <!-- INFO PANEL -->
    <div id="info-panel">
      <div class="pub-row draft" id="pub-row">
        <div><div class="pub-title" id="pub-title">📝 Draft – Belum Diterbitkan</div><div class="pub-sub" id="pub-sub">Tambah minimal 1 bab lalu terbitkan.</div></div>
        <button class="tgl pub" id="pub-tgl" onclick="togglePublish()">🚀 Terbitkan</button>
      </div>

      <div class="card">
        <div class="card-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Informasi Cerita
        </div>
        <div class="g2">
          <div class="fg full"><label class="lbl">Judul Cerita *</label><input type="text" id="f-title" class="inp" placeholder="Contoh: Hujan di Kota Lama" oninput="onTtl()"/></div>
          <div class="fg"><label class="lbl">Genre *</label>
            <select id="f-genre" class="sel">
              <option value="">-- Pilih Genre --</option>
              <option>Romansa</option><option>Fantasi</option><option>Thriller</option>
              <option>Petualangan</option><option>Horror</option><option>Drama</option>
              <option>Komedi</option><option>Misteri</option><option>Sci-Fi</option>
              <option>Slice of Life</option><option>Sejarah</option><option>Lainnya</option>
            </select>
          </div>
          <div class="fg"><label class="lbl">Status</label>
            <select id="f-status" class="sel"><option value="ongoing">Sedang Berjalan</option><option value="completed">Selesai</option><option value="hiatus">Hiatus</option></select>
          </div>
          <div class="fg full"><label class="lbl">Sinopsis *</label><textarea id="f-synopsis" class="ta" rows="4" placeholder="Ringkasan menarik ceritamu..."></textarea></div>
          <div class="fg full">
            <label class="lbl">Sampul (URL Gambar)</label>
            <div class="cover-row">
              <div class="cover-box" id="cover-box"><span>📖</span></div>
              <div style="flex:1"><input type="url" id="f-cover" class="inp" placeholder="https://..." oninput="prevCover(this.value)"/><div class="cover-hint">Paste URL gambar. Rasio 2:3 direkomendasikan.</div></div>
            </div>
          </div>
          <div class="fg full"><label class="lbl">Tag (pisahkan koma)</label><input type="text" id="f-tags" class="inp" placeholder="cinta, kampus, drama"/></div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;padding-top:16px;border-top:1px solid var(--border)">
          <button class="btn-out" onclick="saveDraft()">💾 Simpan Info</button>
          <button class="btn-save" onclick="newChapter()">+ Tambah Bab</button>
        </div>
      </div>
    </div>

    <!-- CHAPTER PANEL -->
    <div id="ch-panel" class="ch-panel">
      <div class="card">
        <div class="card-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span id="ch-panel-ttl">Bab Baru</span>
        </div>
        <div class="fg"><label class="lbl">Judul Bab *</label><input type="text" id="ch-ttl" class="inp" placeholder="Contoh: Pertemuan Tak Terduga"/></div>
        <div class="fg">
          <label class="lbl">Ilustrasi Bab (URL – opsional)</label>
          <img id="illus-img" class="illus-img" alt="ilustrasi"/>
          <input type="url" id="ch-illus" class="inp" placeholder="https://..." oninput="prevIllus(this.value)"/>
        </div>
        <div class="fg">
          <label class="lbl">Isi Cerita *</label>
          <textarea id="ch-content" class="ta ta-lg" placeholder="Tulis isi babmu di sini...&#10;&#10;Tips: Tekan Enter 2x untuk paragraf baru." oninput="updWC()"></textarea>
          <div class="wc-row"><span class="wc" id="wc">0 kata</span><span class="wc">Ctrl+S untuk simpan</span></div>
        </div>
        <div style="display:flex;gap:10px;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid var(--border)">
          <button class="btn-out" onclick="backToInfo()">← Info Cerita</button>
          <div style="display:flex;gap:8px">
            <button class="btn-out" onclick="saveChapter(false)">💾 Simpan Bab</button>
            <button class="btn-save" onclick="saveChapter(true)">Simpan & Bab Baru →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="status-bar" id="sb"><div class="s-dot" id="sdot"></div><span id="stxt">Tersimpan</span></div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, remove, update, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyCe_fyTzxutF1NhTQ-klHpWIUWlL-DXjsk",authDomain:"watchme-75295.firebaseapp.com",databaseURL:"https://watchme-75295-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"watchme-75295",storageBucket:"watchme-75295.firebasestorage.app",messagingSenderId:"989878198067",appId:"1:989878198067:web:e65a5ca1008f349bf46846",measurementId:"G-40YMPH34F4"};
const app=initializeApp(cfg), auth=getAuth(app), db=getDatabase(app);

let me=null,storyId=null,SD=null,chapters=[],activeIdx=-1;
const editId=new URLSearchParams(location.search).get('id');

const $=(id)=>document.getElementById(id);
const gv=(id)=>$(id).value.trim();

function toast(msg,type='blue',dur=3500){const t=$('toast');t.textContent=msg;t.className='on '+type;clearTimeout(t._t);t._t=setTimeout(()=>{t.className='';},dur);}
function setStatus(msg,saving=false){const b=$('sb');$('stxt').textContent=msg;$('sdot').className='s-dot'+(saving?' saving':'');b.classList.add('on');clearTimeout(b._t);if(!saving)b._t=setTimeout(()=>b.classList.remove('on'),3000);}
function showMsg(txt,type='err'){const e=$('msg');e.textContent=txt;e.className='msg '+type;setTimeout(()=>{e.className='msg';},5000);}

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.replace('auth.html');return;}
  $('page-guard').style.display='none';
  me=user;
  if(editId){storyId=editId;await loadStory();}
  else initNew();
});

function initNew(){
  storyId=push(ref(db,'stories')).key;
  SD={id:storyId,title:'',synopsis:'',cover:'',genre:'',status:'ongoing',tags:'',authorId:me.uid,authorName:me.displayName||me.email||'Penulis',published:false,chapterCount:0,likes:0,views:0,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  refreshNav();refreshPubRow();
}

async function loadStory(){
  try{
    const snap=await get(ref(db,`stories/${storyId}`));
    if(!snap.exists()){initNew();return;}
    SD=snap.val();
    $('f-title').value=SD.title||'';
    $('f-genre').value=SD.genre||'';
    $('f-status').value=SD.status||'ongoing';
    $('f-synopsis').value=SD.synopsis||'';
    $('f-cover').value=SD.cover||'';
    $('f-tags').value=SD.tags||'';
    if(SD.cover)prevCover(SD.cover);

    // PENTING: baca chapter dari path TERPISAH chapters/{storyId}/
    const cs=await get(ref(db,`chapters/${storyId}`));
    chapters=[];
    if(cs.exists()){cs.forEach(c=>chapters.push(c.val()));chapters.sort((a,b)=>a.order-b.order);}
    refreshNav();refreshPubRow();renderList();
  }catch(e){console.error(e);toast('Gagal memuat cerita','red');}
}

function refreshNav(){
  $('nav-ttl').textContent=SD?.title||'Cerita Baru';
  $('nav-sub').textContent=SD?.published?'✓ Sudah Diterbitkan':'Draft · belum diterbitkan';
  $('pub-btn-txt').textContent=SD?.published?'Tarik Terbit':'Terbitkan';
}
function refreshPubRow(){
  const p=SD?.published;
  $('pub-row').className='pub-row '+(p?'pub':'draft');
  $('pub-title').textContent=p?'✅ Terbit – Cerita sudah bisa dibaca publik!':'📝 Draft – Belum Diterbitkan';
  $('pub-sub').textContent=p?'Pembaca sudah bisa menemukan dan membaca ceritamu.':'Tambah minimal 1 bab lalu klik Terbitkan.';
  $('pub-tgl').className='tgl '+(p?'draft':'pub');
  $('pub-tgl').textContent=p?'🔒 Tarik ke Draft':'🚀 Terbitkan';
}

window.saveDraft=async()=>{
  const title=gv('f-title'),genre=gv('f-genre'),synopsis=gv('f-synopsis');
  if(!title){showMsg('Judul cerita wajib diisi!');return;}
  if(!genre){showMsg('Pilih genre dulu!');return;}
  if(synopsis.length<10){showMsg('Sinopsis terlalu singkat!');return;}
  setStatus('Menyimpan...',true);
  try{
    const now=new Date().toISOString();
    Object.assign(SD,{title,genre,synopsis,cover:gv('f-cover'),status:$('f-status').value,tags:gv('f-tags'),chapterCount:chapters.length,updatedAt:now});
    // update() → tidak menimpa apapun, hanya update field yang diberikan
    await update(ref(db,`stories/${storyId}`),SD);
    await set(ref(db,`users/${me.uid}/stories/${storyId}`),true);
    refreshNav();refreshPubRow();
    setStatus('Tersimpan ✓');
    toast('✅ Info cerita tersimpan!','green');
  }catch(e){setStatus('Gagal');toast('Gagal menyimpan','red');}
};

window.togglePublish=async()=>{
  if(!SD)return;
  if(!SD.published){
    const title=gv('f-title'),genre=gv('f-genre'),synopsis=gv('f-synopsis');
    if(!title||!genre||synopsis.length<10){showMsg('Lengkapi Judul, Genre, dan Sinopsis dulu!');return;}
    if(chapters.length===0){showMsg('Tambahkan minimal 1 bab sebelum menerbitkan!');return;}
  }
  try{
    await saveDraft();
    const next=!SD.published;
    SD.published=next;
    await update(ref(db,`stories/${storyId}`),{published:next,updatedAt:new Date().toISOString()});
    refreshNav();refreshPubRow();
    toast(next?'🚀 Cerita berhasil diterbitkan! Pembaca bisa membacanya sekarang.':'🔒 Ditarik ke Draft',next?'green':'blue');
  }catch(e){toast('Gagal mengubah status','red');}
};

window.onTtl=()=>{$('nav-ttl').textContent=$('f-title').value||'Cerita Baru';};

window.newChapter=()=>{
  activeIdx=-1;
  $('ch-ttl').value='';$('ch-content').value='';$('ch-illus').value='';
  $('illus-img').className='illus-img';
  $('ch-panel-ttl').textContent=`Bab ${chapters.length+1} – Baru`;
  $('info-panel').style.display='none';
  $('ch-panel').classList.add('on');
  updWC();
  document.querySelectorAll('.ch-item').forEach(e=>e.classList.remove('active'));
};

window.editChapter=(idx)=>{
  activeIdx=idx;
  const ch=chapters[idx];
  $('ch-ttl').value=ch.title||'';
  $('ch-content').value=ch.content||'';
  $('ch-illus').value=ch.illustration||'';
  prevIllus(ch.illustration||'');
  $('ch-panel-ttl').textContent=`Bab ${idx+1} – ${ch.title||'Tanpa Judul'}`;
  $('info-panel').style.display='none';
  $('ch-panel').classList.add('on');
  updWC();
  document.querySelectorAll('.ch-item').forEach((e,i)=>e.classList.toggle('active',i===idx));
};

window.backToInfo=()=>{
  $('info-panel').style.display='block';
  $('ch-panel').classList.remove('on');
  document.querySelectorAll('.ch-item').forEach(e=>e.classList.remove('active'));
};

// ══ INTI FIX: Simpan chapter ke chapters/{storyId}/{chId} – TERPISAH dari stories/ ══
window.saveChapter=async(andNew=false)=>{
  const chTtl=($('ch-ttl').value||'').trim();
  const chCnt=($('ch-content').value||'').trim();
  const chIls=($('ch-illus').value||'').trim();
  if(!chTtl){toast('Judul bab wajib!','red');return;}
  if(chCnt.length<10){toast('Isi bab terlalu singkat!','red');return;}

  const title=gv('f-title'),genre=gv('f-genre');
  if(!title||!genre){toast('Isi Judul & Genre cerita dulu!','red');backToInfo();return;}

  setStatus('Menyimpan bab...',true);
  try{
    const now=new Date().toISOString();
    let chId,order;
    if(activeIdx>=0){
      const ex=chapters[activeIdx];
      chId=ex.id;order=ex.order;
      chapters[activeIdx]={id:chId,title:chTtl,content:chCnt,illustration:chIls,order,createdAt:ex.createdAt||now,updatedAt:now};
    } else {
      chId=push(ref(db,`chapters/${storyId}`)).key;
      order=chapters.length;
      chapters.push({id:chId,title:chTtl,content:chCnt,illustration:chIls,order,createdAt:now,updatedAt:now});
      activeIdx=chapters.length-1;
    }

    // ── SIMPAN ke chapters/{storyId}/{chId} — TIDAK nested di stories/ ──
    await set(ref(db,`chapters/${storyId}/${chId}`),chapters[activeIdx]);

    // ── Update metadata story saja (bukan set penuh, pakai update) ──
    const now2=new Date().toISOString();
    const meta={
      id:storyId,title:title||SD.title,
      genre:genre||SD.genre,
      synopsis:gv('f-synopsis')||SD.synopsis||'',
      cover:gv('f-cover')||SD.cover||'',
      status:$('f-status').value||SD.status||'ongoing',
      tags:gv('f-tags')||SD.tags||'',
      authorId:me.uid,
      authorName:me.displayName||me.email||'Penulis',
      chapterCount:chapters.length,
      published:SD.published||false,
      likes:SD.likes||0,
      views:SD.views||0,
      createdAt:SD.createdAt||now2,
      updatedAt:now2
    };
    Object.assign(SD,meta);
    await update(ref(db,`stories/${storyId}`),meta);
    await set(ref(db,`users/${me.uid}/stories/${storyId}`),true);

    $('ch-panel-ttl').textContent=`Bab ${activeIdx+1} – ${chTtl}`;
    renderList();refreshNav();refreshPubRow();
    setStatus('Bab tersimpan ✓');
    toast('✅ Bab berhasil disimpan!','green');
    if(andNew)newChapter();
  }catch(e){console.error(e);setStatus('Gagal');toast('Gagal menyimpan bab','red');}
};

window.deleteChapter=async(idx)=>{
  if(!confirm(`Hapus Bab ${idx+1}?`))return;
  const ch=chapters[idx];
  try{
    await remove(ref(db,`chapters/${storyId}/${ch.id}`));
    chapters.splice(idx,1);
    for(let i=0;i<chapters.length;i++){chapters[i].order=i;await update(ref(db,`chapters/${storyId}/${chapters[i].id}`),{order:i});}
    await update(ref(db,`stories/${storyId}`),{chapterCount:chapters.length,updatedAt:new Date().toISOString()});
    SD.chapterCount=chapters.length;
    renderList();backToInfo();
    toast('Bab dihapus','blue');
  }catch(e){toast('Gagal menghapus','red');}
};

function renderList(){
  const list=$('ch-list');
  $('ch-badge').textContent=`${chapters.length} bab`;
  if(chapters.length===0){list.innerHTML=`<div style="padding:18px;text-align:center;font-size:12.5px;color:var(--muted);">Belum ada bab.</div>`;return;}
  list.innerHTML=chapters.map((ch,i)=>`
    <div class="ch-item ${i===activeIdx?'active':''}" onclick="editChapter(${i})">
      <div class="ch-num">Bab ${i+1}</div>
      <div class="ch-ttl">${ch.title||'Tanpa Judul'}</div>
      <div class="ch-acts"><button class="ch-del" onclick="event.stopPropagation();deleteChapter(${i})">🗑️ Hapus</button></div>
    </div>`).join('');
}

window.prevCover=v=>{const b=$('cover-box');b.innerHTML=v?`<img src="${v}" onerror="this.parentNode.innerHTML='<span>⚠️</span>'">`:'<span>📖</span>';};
window.prevIllus=v=>{const i=$('illus-img');if(v){i.src=v;i.className='illus-img show';i.onerror=()=>i.className='illus-img';}else i.className='illus-img';};
window.updWC=()=>{const t=$('ch-content').value;$('wc').textContent=`${t.trim()?t.trim().split(/\s+/).length:0} kata`;};

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();$('ch-panel').classList.contains('on')?saveChapter(false):saveDraft();}
});
</script>
</body>
</html>
